services:
  postgres:
    image: postgres:16-alpine
    container_name: sofycrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sofycrm
      POSTGRES_PASSWORD: sofycrm
      POSTGRES_DB: sofycrm
    ports:
      - "5432:5432"
    volumes:
      - sofycrm-pgdata:/var/lib/postgresql/data
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sql/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sofycrm -d sofycrm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sofycrm-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=sofycrm;Username=sofycrm;Password=sofycrm"
      Jwt__Issuer: SofyCRM
      Jwt__Audience: SofyCRM.Client
      Jwt__Secret: "ChangeMe-SofyCRM-Super-Secret-Key-Please-Replace-32+chars"
      Jwt__AccessTokenMinutes: "60"
      Jwt__RefreshTokenDays: "14"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sofycrm-frontend
    restart: unless-stopped
    environment:
      PORT: "80"
    ports:
      - "5173:80"

volumes:
  sofycrm-pgdata:
